name: Render PDF

on:
  push:
    branches: [main]
    paths-ignore:
      - "resume.pdf"

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Render PDF
        run: npx tsx scripts/render.tsx

      - name: Commit resume.pdf
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resume.pdf
          git diff --staged --quiet || (git commit -m "chore: update resume.pdf" && git push)
